# Local stack for simulating the production AWS environment: Postgres (RDS) + MinIO (S3) + MLflow + train + inference

x-env: &env
  MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@postgres:5432/mlflow
  ARTIFACT_ROOT: s3://mlflow-artifacts/
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: us-east-1
  MLFLOW_S3_ENDPOINT_URL: http://minio:9000

services:
  # metadata storage for MLflow
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # artifact storage for MLflow
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb local/mlflow-artifacts --ignore-existing;
      echo 'bucket ready';
      exit 0"
    restart: "no"

  # MLflow tracking server
  mlflow:
    build:
      context: .
      dockerfile: services/mlflow-server/mlflow.dockerfile
    environment:
      <<: *env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:5000/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'

  # training server image
  train:
    build:
      context: .
      dockerfile: services/train/train.dockerfile
    environment:
      <<: *env
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dataset:/app/dataset:ro
      - ./config:/app/config:ro
    depends_on:
      mlflow:
        condition: service_healthy
    restart: "no"

  baselines:
    build:
      context: .
      dockerfile: services/train/train.dockerfile
    command: ["python", "run_baselines.py"]
    environment:
      <<: *env
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./dataset:/app/dataset:ro
      - ./config:/app/config:ro
    depends_on:
      mlflow:
        condition: service_healthy
    restart: "no"

  # inference server image
  inference:
    build:
      context: .
      dockerfile: services/inference/inference.dockerfile
    environment:
      <<: *env
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
