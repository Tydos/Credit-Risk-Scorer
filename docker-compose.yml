# Local stack — MLflow tracking via DagsHub (no local server needed)
# Set DAGSHUB_USER_TOKEN in your environment or a .env file before running.
#
# Usage:
#   docker compose run --rm train              # train + log to DagsHub
#   docker compose up inference                # serve the production model

x-dagshub: &dagshub
  DAGSHUB_USER_TOKEN: ${DAGSHUB_USER_TOKEN}
  DAGSHUB_REPO_OWNER: ${DAGSHUB_REPO_OWNER:-pjawale}
  DAGSHUB_REPO_NAME: ${DAGSHUB_REPO_NAME:-credit-scorer}

services:
  train:
    build:
      context: .
      dockerfile: services/train/train.dockerfile
    environment:
      <<: *dagshub
    volumes:
      - ./dataset:/app/dataset:ro
    restart: "no"

  inference:
    build:
      context: .
      dockerfile: services/inference/inference.dockerfile
    environment:
      <<: *dagshub
    ports:
      - "8000:8000"
